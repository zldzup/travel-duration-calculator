<html lang="zh-CN">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);

            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #8892b0;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ccd6f6;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .icon {
            font-size: 20px;
        }

        /* 上传区域 */
        .upload-zone {
            border: 2px dashed rgba(0,212,255,0.3);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.05);
        }

        .upload-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            font-size: 16px;
            color: #ccd6f6;
        }

        .upload-hint {
            font-size: 13px;
            color: #8892b0;
            margin-top: 8px;
        }

        /* 输入区域 */
        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 120px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #8892b0;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #00d4ff;
        }

        .input-group input::placeholder {
            color: #555;
        }

        .btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,212,255,0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            margin-left: 10px;
        }

        /* 结果区域 */
        .results {
            display: none;
        }

        .results.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            background: rgba(0,212,255,0.08);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
        }

        .result-item:hover {
            background: rgba(0,212,255,0.12);
            transform: translateX(4px);
        }

        .result-icon {
            font-size: 32px;
            flex-shrink: 0;
        }

        .result-info {
            flex: 1;
        }

        .result-name {
            font-size: 16px;
            font-weight: 600;
            color: #ccd6f6;
            margin-bottom: 4px;
        }

        .result-detail {
            font-size: 13px;
            color: #8892b0;
            line-height: 1.5;
        }

        .result-match {
            background: rgba(0,255,136,0.15);
            border-color: rgba(0,255,136,0.3);
        }

        .result-match .result-name {
            color: #00ff88;
        }

        .match-badge {
            background: #00ff88;
            color: #0a192f;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .no-result {
            text-align: center;
            padding: 30px;
            color: #8892b0;
        }

        .no-result-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* 预览图 */
        .preview-container {
            display: none;
            margin-top: 16px;
            text-align: center;
        }

        .preview-container.show {
            display: block;
        }

        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .preview-info {
            margin-top: 8px;
            font-size: 13px;
            color: #8892b0;
        }

        /* 快捷标签 */
        .quick-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .quick-tag {
            padding: 6px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            font-size: 13px;
            color: #ccd6f6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-tag:hover {
            background: rgba(0,212,255,0.15);
            border-color: #00d4ff;
            color: #00d4ff;
        }

        /* 统计 */
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .stat-item {
            font-size: 13px;
            color: #8892b0;
        }

        .stat-value {
            color: #00d4ff;
            font-weight: 600;
            font-size: 18px;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .input-row {
                flex-direction: column;
            }
            .input-group {
                width: 100%;
            }
            h1 {
                font-size: 22px;
            }

            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
        }

            background: rgba(0,212,255,0.15) !important;
            border-color: #00d4ff !important;
            color: #00d4ff !important;
        }
</style>

</div>

<div id="screenshotMode">
<!-- 上传区域 -->
        <div class="card">

            <div class="preview-container" id="previewContainer">

            </div>
        </div>

        <!-- 手动输入 -->
        <div class="card">
            <div class="card-title"><span class="icon">⌨️</span>手动输入分辨率</div>
            <div class="input-row">
                <div class="input-group">
                    <label>宽度 (px)</label>
                    <input type="number" id="widthInput" placeholder="如: 1179">
                </div>
                <div class="input-group">
                    <label>高度 (px)</label>
                    <input type="number" id="heightInput" placeholder="如: 2556">
                </div>
                <div class="input-group">

                    <select id="typeFilter">
                        <option value="all">全部设备</option>
                        <option value="iphone">iPhone</option>
                        <option value="ipad">iPad</option>
                        <option value="mac">Mac</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 12px;">
                <button class="btn" onclick="searchByResolution()">🔍 识别设备</button>
                <button class="btn btn-secondary" onclick="clearAll()">清空</button>
            </div>
            <div class="quick-tags">
                <span style="font-size: 12px; color: #8892b0; margin-right: 4px;">快捷输入:</span>

                <span class="quick-tag" onclick="fillResolution(3024,1964)">MacBook Pro 14"</span>
                <span class="quick-tag" onclick="fillResolution(2560,1664)">MacBook Air 13"</span>
            </div>
        </div>

        <!-- 结果展示 -->
        <div class="card results" id="resultsCard">
            <div class="card-title"><span class="icon">🎯</span>识别结果</div>
            <div id="resultsList"></div>
            <div class="stats" id="statsArea"></div>
        </div>

        <!-- 数据说明 -->
        <div class="card">
            <div class="card-title"><span class="icon">📊</span>截图 + 拍照数据覆盖范围</div>
            <div class="stats">
                <div class="stat-item">

                    <div>iPhone 型号</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="ipadCount">-</div>
                    <div>iPad 型号</div>
                </div>
                <div class="stat-item">

                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">-</div>
                    <div>总计设备</div>
                </div>
            </div>
        </div>
    </div>

// 获取所有设备（扁平化）
function getAllDevices(filter = 'all') {
    let devices = [];
    if (filter === 'all' || filter === 'iphone') devices = devices.concat(deviceDB.iphone.map(d => ({...d, type: 'iphone', icon: '📱'})));
    if (filter === 'all' || filter === 'ipad') devices = devices.concat(deviceDB.ipad.map(d => ({...d, type: 'ipad', icon: '📟'})));
    if (filter === 'all' || filter === 'mac') devices = devices.concat(deviceDB.mac.map(d => ({...d, type: 'mac', icon: '💻'})));
    return devices;
}

// 搜索逻辑
function findDevices(width, height, filter = 'all') {
    const w = parseInt(width);
    const h = parseInt(height);
    if (!w || !h) return [];

    // 支持横竖屏互换
    const devices = getAllDevices(filter);
    const results = [];

    for (const d of devices) {
        // 精确匹配
        const exactMatch = (d.w === w && d.h === h) || (d.w === h && d.h === w);
        // 近似匹配（允许±2像素误差，处理缩放档位差异）
        const approxMatch = (Math.abs(d.w - w) <= 2 && Math.abs(d.h - h) <= 2) || 
                           (Math.abs(d.w - h) <= 2 && Math.abs(d.h - w) <= 2);

        if (exactMatch) {
            results.push({...d, matchType: 'exact', orientation: d.w === w && d.h === h ? '竖屏/原始' : '横屏'});
        } else if (approxMatch) {
            results.push({...d, matchType: 'approx', orientation: Math.abs(d.w - w) <= 2 ? '竖屏/原始' : '横屏'});
        }
    }

    // 按匹配类型排序
    results.sort((a, b) => {
        if (a.matchType === 'exact' && b.matchType !== 'exact') return -1;
        if (a.matchType !== 'exact' && b.matchType === 'exact') return 1;
        return b.year - a.year;
    });

    return results;
}

// 搜索并展示结果
function searchByResolution() {
    const w = document.getElementById('widthInput').value;
    const h = document.getElementById('heightInput').value;
    const filter = document.getElementById('typeFilter').value;

    if (!w || !h) {
        alert('请输入宽度和高度');
        return;
    }

    showResults(findDevices(w, h, filter), w, h);
}

// 展示结果
function showResults(results, inputW, inputH) {
    const card = document.getElementById('resultsCard');
    const list = document.getElementById('resultsList');
    const stats = document.getElementById('statsArea');

    card.classList.add('show');

    if (results.length === 0) {
        list.innerHTML = `
            <div class="no-result">
                <div class="no-result-icon">🔍</div>
                <div>未找到匹配 ${inputW} × ${inputH} 的设备</div>
                <div style="font-size: 12px; margin-top: 8px;">可能是外接显示器、安卓设备，或截图经过裁剪/压缩</div>
            </div>
        `;
        stats.innerHTML = '';
        return;
    }

    let html = '';
    const exactCount = results.filter(r => r.matchType === 'exact').length;

    for (const r of results) {
        const isExact = r.matchType === 'exact';
        const matchLabel = isExact ? '<span class="match-badge">精确匹配</span>' : '<span class="match-badge" style="background:#ffd700;color:#333;">近似匹配</span>';
        const orientationIcon = r.orientation.includes('横') ? '🔄' : '📐';

        html += `
            <div class="result-item ${isExact ? 'result-match' : ''}">
                <div class="result-icon">${r.icon}</div>
                <div class="result-info">
                    <div class="result-name">${r.name} ${matchLabel}</div>
                    <div class="result-detail">
                        ${orientationIcon} ${r.orientation} · ${r.w} × ${r.h} px · ${r.scale} · ${r.year > 0 ? r.year + '年' : '外接设备'}
                        <br>💡 ${r.note}
                    </div>
                </div>
            </div>
        `;
    }

    list.innerHTML = html;

    // 计算置信度
    const features = { estimatedYear: results.length > 0 ? results[0].year : null };
    const confidence = calculateConfidence(results, features);

    let confidenceHtml = '';

// 文件上传处理
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const previewContainer = document.getElementById('previewContainer');
const previewImg = document.getElementById('previewImg');
const previewInfo = document.getElementById('previewInfo');

uploadZone.addEventListener('click', () => fileInput.click());

uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
});

uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('dragover');
});

uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) handleFile(files[0]);
});

fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

function handleFile(file) {
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件');
        return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            const w = img.naturalWidth;
            const h = img.naturalHeight;

            // 增强特征分析
            const features = analyzeDeviceFeatures(file, img, w, h, 'screenshot');

            previewImg.src = e.target.result;
            previewContainer.classList.add('show');

            // 构建详细信息
            let infoHtml = `📐 原始尺寸: <strong>${w} × ${h}</strong> px · 比例 ${features.ratio}<br>`;
            infoHtml += `📁 文件: ${file.name}<br>`;
            infoHtml += `📊 推断: ${features.screenType} · 预估年份 ~${features.estimatedYear}`;
            if (features.sourceType && features.sourceType !== 'unknown') {
                infoHtml += ` · 来源: ${features.sourceType === 'screenshot' ? '截图' : features.sourceType}`;
            }
            previewInfo.innerHTML = infoHtml;

            // 自动填入并搜索
            document.getElementById('widthInput').value = w;
            document.getElementById('heightInput').value = h;
            searchByResolution();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// 相机搜索逻辑
function findCameraDevices(width, height, filter = 'all') {
    const w = parseInt(width);
    const h = parseInt(height);
    if (!w || !h) return [];

    const devices = [];
    if (filter === 'all' || filter === 'iphone') devices.push(...cameraDB.iphone.map(d => ({...d, type: 'iphone', icon: '📱'})));
    if (filter === 'all' || filter === 'ipad') devices.push(...cameraDB.ipad.map(d => ({...d, type: 'ipad', icon: '📟'})));
    if (filter === 'all' || filter === 'mac') devices.push(...cameraDB.mac.map(d => ({...d, type: 'mac', icon: '💻'})));

    const results = [];

    for (const d of devices) {
        // 精确匹配
        const exactMatch = (d.w === w && d.h === h) || (d.w === h && d.h === w);
        // 近似匹配（允许±4像素，处理不同格式/裁切）
        const approxMatch = (Math.abs(d.w - w) <= 4 && Math.abs(d.h - h) <= 4) || 
                           (Math.abs(d.w - h) <= 4 && Math.abs(d.h - w) <= 4);
        // 比例匹配（相同比例但不同分辨率，如4800万 vs 1200万像素合并）
        const inputRatio = w / h;
        const deviceRatio = d.w / d.h;
        const ratioMatch = Math.abs(inputRatio - deviceRatio) < 0.01 && !exactMatch && !approxMatch;

        if (exactMatch) {
            results.push({...d, matchType: 'exact', orientation: d.w === w && d.h === h ? '原始方向' : '旋转方向'});
        } else if (approxMatch) {
            results.push({...d, matchType: 'approx', orientation: Math.abs(d.w - w) <= 4 ? '原始方向' : '旋转方向'});
        } else if (ratioMatch) {
            results.push({...d, matchType: 'ratio', orientation: '相同比例, 不同分辨率'});
        }
    }

    // 排序：精确 > 近似 > 比例
    const matchOrder = { exact: 0, approx: 1, ratio: 2 };
    results.sort((a, b) => {
        if (matchOrder[a.matchType] !== matchOrder[b.matchType]) {
            return matchOrder[a.matchType] - matchOrder[b.matchType];
        }
        return b.year - a.year;
    });

    return results;
}

// 相机识别展示
function showCameraResults(results, inputW, inputH) {
    const card = document.getElementById('cameraResultsCard');
    const list = document.getElementById('cameraResultsList');
    const stats = document.getElementById('cameraStatsArea');

    card.classList.add('show');

    if (results.length === 0) {
        list.innerHTML = `
            <div class="no-result">
                <div class="no-result-icon">📷</div>
                <div>未找到匹配 ${inputW} × ${inputH} 的拍照设备</div>
                <div style="font-size: 12px; margin-top: 8px;">可能是第三方相机App导出、安卓设备、或经过后期裁切/压缩</div>
            </div>
        `;
        stats.innerHTML = '';
        return;
    }

    let html = '';
    const exactCount = results.filter(r => r.matchType === 'exact').length;

    for (const r of results) {
        const isExact = r.matchType === 'exact';
        const isApprox = r.matchType === 'approx';
        let matchLabel;
        if (isExact) matchLabel = '<span class="match-badge">精确匹配</span>';
        else if (isApprox) matchLabel = '<span class="match-badge" style="background:#ffd700;color:#333;">近似匹配</span>';
        else matchLabel = '<span class="match-badge" style="background:#ff6b6b;color:#fff;">比例匹配</span>';

        const mpInfo = r.mp >= 1 ? r.mp + 'MP' : (r.mp * 100).toFixed(0) + '万像素';

        html += `
            <div class="result-item ${isExact ? 'result-match' : ''}">
                <div class="result-icon">${r.icon}</div>
                <div class="result-info">
                    <div class="result-name">${r.name} ${matchLabel}</div>
                    <div class="result-detail">
                        📐 ${r.orientation} · ${r.w} × ${r.h} px · ${mpInfo} · ${r.scale}
                        <br>📷 ${r.sensor} · ${r.modes}
                        <br>💡 ${r.note}
                    </div>
                </div>
            </div>
        `;
    }

    list.innerHTML = html;

    // 计算置信度
    const features = { estimatedYear: results.length > 0 ? results[0].year : null };
    const confidence = calculateConfidence(results, features);

    let confidenceHtml = '';
    if (confidence.level === 'high') {
        confidenceHtml = `<div style="display:inline-flex; align-items:center; gap:6px; background:rgba(0,255,136,0.15); padding:6px 14px; border-radius:20px; margin-bottom:12px;"><span style="color:#00ff88; font-weight:700;">✅ 高置信度 (${confidence.score}分)</span><span style="color:#8892b0; font-size:12px;">${confidence.reasons.join(' · ')}</span></div>`;
    } else if (confidence.level === 'medium') {
        confidenceHtml = `<div style="display:inline-flex; align-items:center; gap:6px; background:rgba(255,215,0,0.15); padding:6px 14px; border-radius:20px; margin-bottom:12px;"><span style="color:#ffd700; font-weight:700;">⚠️ 中等置信度 (${confidence.score}分)</span><span style="color:#8892b0; font-size:12px;">${confidence.reasons.join(' · ')}</span></div>`;
    } else if (confidence.level === 'low') {
        confidenceHtml = `<div style="display:inline-flex; align-items:center; gap:6px; background:rgba(255,107,107,0.15); padding:6px 14px; border-radius:20px; margin-bottom:12px;"><span style="color:#ff6b6b; font-weight:700;">❓ 低置信度 (${confidence.score}分)</span><span style="color:#8892b0; font-size:12px;">${confidence.reasons.join(' · ')}</span></div>`;
    }

    // 将置信度插入到结果列表前面
    list.innerHTML = confidenceHtml + list.innerHTML;

    // 计算置信度
    const features = { estimatedYear: results.length > 0 ? results[0].year : null };
    const confidence = calculateConfidence(results, features);

    let confidenceHtml = '';
    if (confidence.level === 'high') {
        confidenceHtml = `<div style="display:inline-flex; align-items:center; gap:6px; background:rgba(0,255,136,0.15); padding:6px 14px; border-radius:20px; margin-bottom:12px;"><span style="color:#00ff88; font-weight:700;">✅ 高置信度 (${confidence.score}分)</span><span style="color:#8892b0; font-size:12px;">${confidence.reasons.join(' · ')}</span></div>`;

        confidenceHtml = `<div style="display:inline-flex; align-items:center; gap:6px; background:rgba(255,107,107,0.15); padding:6px 14px; border-radius:20px; margin-bottom:12px;"><span style="color:#ff6b6b; font-weight:700;">❓ 低置信度 (${confidence.score}分)</span><span style="color:#8892b0; font-size:12px;">${confidence.reasons.join(' · ')}</span></div>`;
    }

    list.innerHTML = confidenceHtml + list.innerHTML;

    const typeCount = {};
    results.forEach(r => {
        const t = r.type === 'iphone' ? 'iPhone' : r.type === 'ipad' ? 'iPad' : 'Mac';
        typeCount[t] = (typeCount[t] || 0) + 1;
    });

}

// 获取所有压缩场景设备
function getAllCompressedDevices(filter = 'all') {
    let devices = [];
    if (filter === 'all' || filter === 'wechat') devices = devices.concat(compressedDB.wechat.map(d => ({...d, type: 'compressed', icon: '💬', category: '微信'})));
    if (filter === 'all' || filter === 'social') devices = devices.concat(compressedDB.social.map(d => ({...d, type: 'compressed', icon: '🌐', category: '社交平台'})));
    if (filter === 'all' || filter === 'system') devices = devices.concat(compressedDB.system.map(d => ({...d, type: 'compressed', icon: '⚙️', category: '系统/App'})));
    if (filter === 'all' || filter === 'thirdparty') devices = devices.concat(compressedDB.thirdparty.map(d => ({...d, type: 'compressed', icon: '📲', category: '第三方App'})));
    if (filter === 'all' || filter === 'generic') devices = devices.concat(compressedDB.generic.map(d => ({...d, type: 'compressed', icon: '📐', category: '通用压缩'})));
    return devices;
}

// 压缩场景搜索
function findCompressedDevices(width, height, filter = 'all') {
    const w = parseInt(width);
    const h = parseInt(height);
    if (!w || !h) return [];

    const devices = getAllCompressedDevices(filter);
    const results = [];

    for (const d of devices) {
        const exactMatch = (d.w === w && d.h === h) || (d.w === h && d.h === w);
        const approxMatch = (Math.abs(d.w - w) <= 4 && Math.abs(d.h - h) <= 4) || 
                           (Math.abs(d.w - h) <= 4 && Math.abs(d.h - w) <= 4);
        const ratioMatch = !exactMatch && !approxMatch && 
                          Math.abs((w/h) - (d.w/d.h)) < 0.01;

        if (exactMatch) {
            results.push({...d, matchType: 'exact', orientation: d.w === w && d.h === h ? '原始方向' : '旋转方向'});
        } else if (approxMatch) {
            results.push({...d, matchType: 'approx', orientation: Math.abs(d.w - w) <= 4 ? '原始方向' : '旋转方向'});
        } else if (ratioMatch) {
            results.push({...d, matchType: 'ratio', orientation: '相同比例'});
        }
    }

    results.sort((a, b) => {
        const order = { exact: 0, approx: 1, ratio: 2 };
        return order[a.matchType] - order[b.matchType];
    });

    return results;
}

// 反向推断原始设备 - 从压缩分辨率反推可能的原始设备
function inferOriginalDevice(w, h, compressedResults) {
    const inferences = [];

    // 根据压缩场景推断原始分辨率
    for (const cr of compressedResults) {
        let originalW, originalH, possibleDevices = [];

        // 微信压缩：通常是原图的一半或保持
        if (cr.source === '微信压缩' && cr.w === 4032 && cr.h === 3024) {
            originalW = 8064; originalH = 6048;
            possibleDevices = cameraDB.iphone.filter(d => d.w === 8064 && d.h === 6048);
        }
        else if (cr.source === '微信缩略') {
            originalW = 4032; originalH = 3024;
            possibleDevices = cameraDB.iphone.filter(d => d.w === 4032 && d.h === 3024);
        }
        // 社交平台压缩
        else if (cr.source === '微博' && cr.w === 2048) {
            originalW = 4032; originalH = 3024;
            possibleDevices = cameraDB.iphone.filter(d => d.w === 4032 && d.h === 3024);
        }
        else if (cr.source === '小红书' && cr.w === 1080) {
            // 小红书3:4裁剪，原始可能是多种比例
            possibleDevices = cameraDB.iphone.filter(d => d.w >= 4032);
        }
        // 通用压缩
        else if (cr.source === '通用压缩') {
            if (cr.w === 2016) { originalW = 4032; originalH = 3024; }
            else if (cr.w === 1008) { originalW = 4032; originalH = 3024; }
            else if (cr.w === 1440) { originalW = 4032; originalH = 3024; }
            else if (cr.w === 960) { originalW = 4032; originalH = 3024; }
            else if (cr.w === 640) { originalW = 3264; originalH = 2448; }

            if (originalW) {
                possibleDevices = cameraDB.iphone.filter(d => d.w === originalW && d.h === originalH);
            }
        }

        if (possibleDevices.length > 0) {
            inferences.push({
                compressedResult: cr,
                originalW,
                originalH,
                possibleDevices: possibleDevices.slice(0, 3) // 最多3个
            });
        }
    }

    return inferences;
}

// 综合特征分析器 - 结合多种条件提高准确性
function analyzeDeviceFeatures(file, img, w, h, mode) {
    const features = {
        width: w,
        height: h,
        ratio: parseFloat((w / h).toFixed(4)),
        mp: parseFloat(((w * h) / 1000000).toFixed(1)),
        isLandscape: w > h,
        isPortrait: h > w,
        isSquare: Math.abs(w - h) <= 2,
        fileName: file ? file.name : '',
        fileSize: file ? file.size : 0,
        fileType: file ? file.type : '',
        colorSpace: null,
        hasAlpha: false,
        estimatedYear: null,
        confidence: 'medium'
    };

    // 从文件名推断
    if (file) {
        const name = file.name.toLowerCase();
        if (name.includes('screenshot') || name.includes('截屏') || name.includes('屏幕')) {
            features.sourceType = 'screenshot';
        } else if (name.includes('photo') || name.includes('img') || name.includes('image') || name.includes('照片')) {
            features.sourceType = 'photo';
        } else if (name.includes('camera') || name.includes('相机')) {
            features.sourceType = 'camera';
        } else {
            features.sourceType = 'unknown';
        }

        // 从文件名推断日期
        const dateMatch = name.match(/(20\d{2})/);
        if (dateMatch) {
            features.fileYear = parseInt(dateMatch[1]);
        }
    }

    // 从像素推断大致年份
    if (mode === 'camera') {
        if (features.mp >= 48) features.estimatedYear = 2022;
        else if (features.mp >= 12) features.estimatedYear = 2015;
        else if (features.mp >= 8) features.estimatedYear = 2012;
        else if (features.mp >= 5) features.estimatedYear = 2010;
        else features.estimatedYear = 2007;
    } else {
        // 截图模式年份推断
        if (w >= 1320 || h >= 2868) features.estimatedYear = 2024;
        else if (w >= 1290 || h >= 2796) features.estimatedYear = 2022;
        else if (w >= 1284 || h >= 2778) features.estimatedYear = 2020;
        else if (w >= 1179 || h >= 2556) features.estimatedYear = 2020;
        else if (w >= 1125 || h >= 2436) features.estimatedYear = 2017;
        else if (w >= 1080 || h >= 1920) features.estimatedYear = 2015;
        else if (w >= 750 || h >= 1334) features.estimatedYear = 2014;
        else features.estimatedYear = 2012;
    }

    // 比例特征分析
    const ratio = features.ratio;
    if (Math.abs(ratio - 9/19.5) < 0.01) features.screenType = 'iPhone全面屏';
    else if (Math.abs(ratio - 9/16) < 0.01) features.screenType = 'iPhone传统屏';
    else if (Math.abs(ratio - 3/4) < 0.01) features.screenType = 'iPad竖屏';
    else if (Math.abs(ratio - 4/3) < 0.01) features.screenType = 'iPad横屏';
    else if (Math.abs(ratio - 16/9) < 0.01) features.screenType = 'Mac/显示器';
    else if (Math.abs(ratio - 16/10) < 0.01) features.screenType = 'Mac笔记本';
    else if (Math.abs(ratio - 4/3) < 0.02) features.screenType = 'iPad';
    else features.screenType = '未知比例';

    return features;
}

// 交叉验证 - 结合截图和拍照数据库双重验证
function crossValidate(w, h, mode) {
    const results = {
        screenshot: mode === 'screenshot' ? findDevices(w, h, 'all') : findDevices(w, h, 'all'),
        camera: mode === 'camera' ? findCameraDevices(w, h, 'all') : findCameraDevices(w, h, 'all'),
        combined: [],
        analysis: {}
    };

    // 合并结果并标记来源
    const allResults = [];

    results.screenshot.forEach(r => {
        allResults.push({...r, source: 'screenshot', priority: r.matchType === 'exact' ? 1 : 2});
    });

    results.camera.forEach(r => {
        allResults.push({...r, source: 'camera', priority: r.matchType === 'exact' ? 1 : 3});
    });

    // 去重 - 同型号取最精确匹配
    const seen = new Set();
    results.combined = allResults.filter(r => {
        const key = r.name + '|' + r.source;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });

    // 排序
    results.combined.sort((a, b) => {
        const priorityOrder = { exact: 0, approx: 1, ratio: 2 };
        if (priorityOrder[a.matchType] !== priorityOrder[b.matchType]) {
            return priorityOrder[a.matchType] - priorityOrder[b.matchType];
        }
        return b.year - a.year;
    });

    return results;
}

// 置信度评分
function calculateConfidence(results, features) {
    let score = 0;
    let reasons = [];

    // 精确匹配加分
    const exactCount = results.filter(r => r.matchType === 'exact').length;
    if (exactCount > 0) {
        score += 40;
        reasons.push(`精确匹配 ${exactCount} 个型号`);
    }

    // 近似匹配加分
    const approxCount = results.filter(r => r.matchType === 'approx').length;
    if (approxCount > 0) {
        score += 20;
        reasons.push(`近似匹配 ${approxCount} 个型号`);
    }

    // 比例匹配
    const ratioCount = results.filter(r => r.matchType === 'ratio').length;
    if (ratioCount > 0) {
        score += 10;
        reasons.push(`比例匹配 ${ratioCount} 个型号`);
    }

    // 年份一致性
    if (features.estimatedYear) {
        const yearMatches = results.filter(r => Math.abs(r.year - features.estimatedYear) <= 2);
        if (yearMatches.length > 0) {
            score += 15;
            reasons.push('年份推断一致');
        }
    }

    // 文件特征
    if (features.sourceType === 'screenshot' || features.sourceType === 'photo') {
        score += 10;
        reasons.push('文件名特征辅助确认');
    }

    // 单一精确匹配最高置信度
    if (exactCount === 1 && results.length === 1) {
        score += 20;
        reasons.push('唯一精确匹配');
    }

    // 置信度等级
    let level;
    if (score >= 80) level = 'high';
    else if (score >= 50) level = 'medium';
    else if (score >= 20) level = 'low';
    else level = 'uncertain';

    return { score, level, reasons };
}

});

});

function handleCameraFile(file) {
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件');
        return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            const w = img.naturalWidth;
            const h = img.naturalHeight;

            // 增强特征分析
            const features = analyzeDeviceFeatures(file, img, w, h, 'camera');

            cameraPreviewImg.src = e.target.result;
            cameraPreviewContainer.classList.add('show');

            // 构建详细信息
            let infoHtml = `📐 照片尺寸: <strong>${w} × ${h}</strong> px · ${features.mp}MP · 比例 ${features.ratio}<br>`;
            infoHtml += `📁 文件: ${file.name} · ${(file.size/1024/1024).toFixed(2)}MB<br>`;
            infoHtml += `📊 推断: ${features.screenType} · 预估年份 ~${features.estimatedYear}`;
            if (features.sourceType && features.sourceType !== 'unknown') {
                infoHtml += ` · 来源: ${features.sourceType === 'screenshot' ? '截图' : features.sourceType === 'photo' ? '照片' : features.sourceType}`;
            }
            cameraPreviewInfo.innerHTML = infoHtml;

            document.getElementById('cameraWidthInput').value = w;
            document.getElementById('cameraHeightInput').value = h;
            searchByCameraResolution();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

        screenshotMode.style.display = 'block';
        tabScreenshot.classList.add('active');
        tabScreenshot.style.background = 'linear-gradient(135deg,#00d4ff,#7b2cbf)';
        tabScreenshot.style.color = 'white';
    } else if (mode === 'camera') {
        cameraMode.style.display = 'block';
        tabCamera.classList.add('active');
        tabCamera.style.background = 'linear-gradient(135deg,#ff6b6b,#ee5a24)';
        tabCamera.style.color = 'white';
    } else if (mode === 'compressed') {
        compressedMode.style.display = 'block';
        tabCompressed.classList.add('active');
        tabCompressed.style.background = 'linear-gradient(135deg,#a8e6cf,#1de9b6)';
        tabCompressed.style.color = '#0a192f';
    }
}

// 压缩场景搜索入口
function searchByCompressedResolution() {
    const w = document.getElementById('compressedWidthInput').value;
    const h = document.getElementById('compressedHeightInput').value;
    const filter = document.getElementById('compressedTypeFilter').value;

    if (!w || !h) {
        alert('请输入宽度和高度');
        return;
    }

    showCompressedResults(findCompressedDevices(w, h, filter), w, h);
}

// 展示压缩结果
function showCompressedResults(results, inputW, inputH) {
    const card = document.getElementById('compressedResultsCard');
    const list = document.getElementById('compressedResultsList');
    const stats = document.getElementById('compressedStatsArea');
    const inferenceCard = document.getElementById('inferenceCard');
    const inferenceList = document.getElementById('inferenceList');

    card.classList.add('show');

    if (results.length === 0) {
        list.innerHTML = `
            <div class="no-result">
                <div class="no-result-icon">🗜️</div>
                <div>未找到匹配 ${inputW} × ${inputH} 的压缩场景</div>
                <div style="font-size: 12px; margin-top: 8px;">可能是自定义压缩、其他平台、或已多次压缩</div>
            </div>
        `;
        stats.innerHTML = '';
        inferenceCard.style.display = 'none';
        return;
    }

    let html = '';
    const exactCount = results.filter(r => r.matchType === 'exact').length;

    for (const r of results) {
        const isExact = r.matchType === 'exact';
        let matchLabel;
        if (isExact) matchLabel = '<span class="match-badge">精确匹配</span>';
        else if (r.matchType === 'approx') matchLabel = '<span class="match-badge" style="background:#ffd700;color:#333;">近似匹配</span>';
        else matchLabel = '<span class="match-badge" style="background:#ff6b6b;color:#fff;">比例匹配</span>';

        html += `
            <div class="result-item ${isExact ? 'result-match' : ''}">
                <div class="result-icon">${r.icon}</div>
                <div class="result-info">
                    <div class="result-name">${r.name} ${matchLabel}</div>
                    <div class="result-detail">
                        📐 ${r.orientation} · ${r.w} × ${r.h} px · 来源: ${r.source}
                        <br>🏷️ ${r.category} · 💡 ${r.note}
                    </div>
                </div>
            </div>
        `;
    }

    list.innerHTML = html;

    // 统计
    const categoryCount = {};
    results.forEach(r => {
        categoryCount[r.category] = (categoryCount[r.category] || 0) + 1;
    });

    stats.innerHTML = `
        <div class="stat-item">
            <div class="stat-value">${results.length}</div>
            <div>匹配场景</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">${exactCount}</div>
            <div>精确匹配</div>
        </div>
        ${Object.entries(categoryCount).map(([k,v]) => `
            <div class="stat-item">
                <div class="stat-value">${v}</div>
                <div>${k}</div>
            </div>
        `).join('')}
    `;

    // 原始设备推断
    const inferences = inferOriginalDevice(parseInt(inputW), parseInt(inputH), results);
    if (inferences.length > 0) {
        inferenceCard.style.display = 'block';
        let infHtml = '';
        for (const inf of inferences) {
            infHtml += `<div style="margin-bottom:12px; padding:12px; background:rgba(0,212,255,0.05); border-radius:8px; border-left:3px solid #00d4ff;">`;
            infHtml += `<div style="font-weight:600; color:#ccd6f6; margin-bottom:6px;">🔍 推断原始分辨率: ${inf.originalW} × ${inf.originalH} px</div>`;
            infHtml += `<div style="font-size:13px; color:#8892b0; margin-bottom:8px;">基于: ${inf.compressedResult.source} - ${inf.compressedResult.name}</div>`;
            infHtml += `<div style="font-size:13px;">可能的原始设备:</div>`;
            for (const dev of inf.possibleDevices) {
                infHtml += `<div style="padding:6px 10px; margin:4px 0; background:rgba(255,255,255,0.05); border-radius:6px; font-size:13px; color:#e0e0e0;">📱 ${dev.name} · ${dev.year}年 · ${dev.note}</div>`;
            }
            infHtml += `</div>`;
        }
        inferenceList.innerHTML = infHtml;
    } else {
        inferenceCard.style.display = 'none';
    }
}

// 压缩快捷标签
function fillCompressedResolution(w, h) {
    document.getElementById('compressedWidthInput').value = w;
    document.getElementById('compressedHeightInput').value = h;
    searchByCompressedResolution();
}

// 清空压缩
function clearCompressed() {
    document.getElementById('compressedWidthInput').value = '';
    document.getElementById('compressedHeightInput').value = '';
    document.getElementById('compressedResultsCard').classList.remove('show');
    document.getElementById('compressedPreviewContainer').classList.remove('show');
    document.getElementById('inferenceCard').style.display = 'none';
    document.getElementById('compressedFileInput').value = '';
}

// 压缩文件上传处理
const compressedUploadZone = document.getElementById('compressedUploadZone');
const compressedFileInput = document.getElementById('compressedFileInput');
const compressedPreviewContainer = document.getElementById('compressedPreviewContainer');
const compressedPreviewImg = document.getElementById('compressedPreviewImg');
const compressedPreviewInfo = document.getElementById('compressedPreviewInfo');

if (compressedUploadZone) {
    compressedUploadZone.addEventListener('click', () => compressedFileInput.click());
    compressedUploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        compressedUploadZone.classList.add('dragover');
    });
    compressedUploadZone.addEventListener('dragleave', () => {
        compressedUploadZone.classList.remove('dragover');
    });
    compressedUploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        compressedUploadZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) handleCompressedFile(files[0]);
    });
}

if (compressedFileInput) {
    compressedFileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleCompressedFile(e.target.files[0]);
    });
}

function handleCompressedFile(file) {
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件');
        return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            const w = img.naturalWidth;
            const h = img.naturalHeight;

            compressedPreviewImg.src = e.target.result;
            compressedPreviewContainer.classList.add('show');

            const fileSizeMB = (file.size / 1024 / 1024).toFixed(2);
            let infoHtml = `📐 图片尺寸: <strong>${w} × ${h}</strong> px · ${fileSizeMB}MB<br>`;
            infoHtml += `📁 文件: ${file.name}<br>`;

            // 根据文件大小推断压缩程度
            if (fileSizeMB < 0.1) {
                infoHtml += `🗜️ <strong>高度压缩</strong> - 可能经过多次转发/压缩`;
            } else if (fileSizeMB < 0.5) {
                infoHtml += `🗜️ <strong>中度压缩</strong> - 可能经过社交平台压缩`;
            } else if (fileSizeMB < 2) {
                infoHtml += `📷 <strong>轻度压缩</strong> - 可能为App导出或原图压缩`;
            } else {
                infoHtml += `📷 <strong>接近原图</strong> - 文件较大，压缩程度低`;
            }

            compressedPreviewInfo.innerHTML = infoHtml;

            document.getElementById('compressedWidthInput').value = w;
            document.getElementById('compressedHeightInput').value = h;
            searchByCompressedResolution();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

</script>
